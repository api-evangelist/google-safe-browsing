name: Google Safe Browsing API
description: >-
  The Google Safe Browsing API enables client applications to check web
  resources (most commonly URLs) against Google-generated lists of unsafe web
  resources including malware, social engineering, unwanted software, and
  potentially harmful applications.
image: https://kinlane-productions2.s3.amazonaws.com/apis-json/apis-json-logo.jpg
url: https://raw.githubusercontent.com/api-evangelist/google-safe-browsing/refs/heads/main/apis.yml
created: '2026-03-13'
modified: '2026-03-13'
specificationVersion: '0.18'
tags:
  - Security
  - Safe Browsing
  - Threats
  - Malware
  - URLs
  - Google
apis:
  - name: Google Safe Browsing API
    description: >-
      Enables checking URLs and web resources against Google-maintained lists
      of unsafe content, including malware, social engineering, and unwanted
      software threats.
    humanURL: https://developers.google.com/safe-browsing
    baseURL: https://safebrowsing.googleapis.com/v4
    properties:
      - type: OpenAPI
        url: openapi/openapi.yml
      - type: JSONSchema
        url: json-schema/ThreatMatch.json
    tags:
      - Security
      - Threats
      - URLs
      - Malware
common:
