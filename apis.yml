aid: google-safe-browsing
name: Google Safe Browsing
description: >-
  The Google Safe Browsing API enables client applications to check web
  resources (most commonly URLs) against Google-generated lists of unsafe web
  resources including malware, social engineering, unwanted software, and
  potentially harmful applications.
